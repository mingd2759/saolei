<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>MineSweeper Game</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #f0f0f0;\n            font-family: Arial, sans-serif;\n        }\n        #board {\n            display: grid;\n            grid-template-columns: repeat(10, 1fr);\n            gap: 2px;\n        }\n        .cell {\n            width: 40px;\n            height: 40px;\n            background-color: #ddd;\n            text-align: center;\n            line-height: 40px;\n            cursor: pointer;\n        }\n        .cell.revealed {\n            background-color: #fff;\n        }\n        .cell.flag {\n            background-color: #ffcc00;\n        }\n    </style>\n</head>\n<body>\n    <div id="board"></div>\n    <script>\n        class MineSweeper {\n            constructor(size, mineCount) {\n                this.size = size;\n                this.mineCount = mineCount;\n                this.board = [];\n                this.isGameOver = false;\n                this.init();\n            }\n            init() {\n                this.createBoard();\n                this.placeMines();\n                this.calculateNumbers();\n                this.renderBoard();\n            }\n            createBoard() {\n                for (let i = 0; i < this.size; i++) {\n                    this.board[i] = [];\n                    for (let j = 0; j < this.size; j++) {\n                        this.board[i][j] = { revealed: false, mine: false, flag: false, surroundingMines: 0 };\n                    }\n                }\n            }\n            placeMines() {\n                let placedMines = 0;\n                while (placedMines < this.mineCount) {\n                    let x = Math.floor(Math.random() * this.size);\n                    let y = Math.floor(Math.random() * this.size);\n                    if (!this.board[x][y].mine) {\n                        this.board[x][y].mine = true;\n                        placedMines++;\n                    }\n                }\n            }\n            calculateNumbers() {\n                for (let i = 0; i < this.size; i++) {\n                    for (let j = 0; j < this.size; j++) {\n                        if (this.board[i][j].mine) {\n                            this.updateSurroundingCells(i, j);\n                        }\n                    }\n                }\n            }\n            updateSurroundingCells(x, y) {\n                for (let i = -1; i <= 1; i++) {\n                    for (let j = -1; j <= 1; j++) {\n                        if (this.isValidCell(x + i, y + j)) {\n                            this.board[x + i][y + j].surroundingMines++;\n                        }\n                    }\n                }\n            }\n            isValidCell(x, y) {\n                return x >= 0 && x < this.size && y >= 0 && y < this.size;\n            }\n            renderBoard() {\n                const boardElement = document.getElementById('board');\n                boardElement.innerHTML = '';\n                for (let i = 0; i < this.size; i++) {\n                    for (let j = 0; j < this.size; j++) {\n                        const cell = this.board[i][j];\n                        const cellElement = document.createElement('div');\n                        cellElement.className = 'cell';\n                        cellElement.dataset.x = i;\n                        cellElement.dataset.y = j;\n                        cellElement.addEventListener('click', () => this.handleCellClick(i, j));\n                        cellElement.addEventListener('contextmenu', (e) => {\n                            e.preventDefault();\n                            this.handleRightClick(i, j);\n                        });\n                        if (cell.revealed) {\n                            this.updateCell(cellElement, cell);\n                        }\n                        boardElement.appendChild(cellElement);\n                    }\n                }\n            }\n            handleCellClick(x, y) {\n                if (this.isGameOver || this.board[x][y].revealed || this.board[x][y].flag) return;\n                const cell = this.board[x][y];\n                cell.revealed = true;\n                if (cell.mine) {\n                    this.endGame();\n                } else {\n                    this.renderBoard();\n                    if (cell.surroundingMines === 0) {\n                        this.revealSurroundingCells(x, y);\n                    }\n                }\n                this.renderBoard();\n            }\n            revealSurroundingCells(x, y) {\n                for (let i = -1; i <= 1; i++) {\n                    for (let j = -1; j <= 1; j++) {\n                        if (this.isValidCell(x + i, y + j)) {\n                            this.handleCellClick(x + i, y + j);\n                        }\n                    }\n                }\n            }\n            handleRightClick(x, y) {\n                const cell = this.board[x][y];\n                if (cell.revealed) return;\n                cell.flag = !cell.flag;\n                this.renderBoard();\n            }\n            updateCell(cellElement, cell) {\n                cellElement.classList.add('revealed');\n                if (cell.mine) {\n                    cellElement.textContent = '💣';\n                } else if (cell.surroundingMines > 0) {\n                    cellElement.textContent = cell.surroundingMines;\n                }\n            }\n            endGame() {\n                this.isGameOver = true;\n                alert('Game Over!');\n                this.renderBoard();\n            }\n        }\n        const game = new MineSweeper(10, 20);\n    </script>\n</body>\n</html>
